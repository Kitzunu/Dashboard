<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'">
  <title>AC Dashboard Launcher</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- ── Title bar ──────────────────────────────────────────── -->
  <header class="titlebar">
    <div class="titlebar-left">
      <svg class="titlebar-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
      </svg>
      <span class="titlebar-title">AC Dashboard Launcher</span>
    </div>
    <div class="titlebar-actions">
      <button id="btn-settings" class="icon-btn" title="Settings">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ── Main layout ────────────────────────────────────────── -->
  <main class="main">
    <!-- Sidebar: service cards -->
    <aside class="sidebar">
      <div class="global-actions">
        <button id="btn-start-all" class="btn btn-success btn-sm">Start All</button>
        <button id="btn-stop-all" class="btn btn-danger btn-sm">Stop All</button>
        <button id="btn-open-dash" class="btn btn-primary btn-sm" title="Open Dashboard in browser">Open Dashboard</button>
      </div>

      <div id="service-cards" class="service-cards">
        <!-- Populated by JS -->
      </div>

      <!-- Game servers section -->
      <div class="section-divider">
        <span class="section-label">Game Servers</span>
        <span id="agent-status-hint" class="section-hint">agent not running</span>
      </div>

      <div id="game-server-cards" class="service-cards">
        <div class="log-empty" style="font-size:11px; padding:8px 0;">Start the Server Agent to manage game servers</div>
      </div>

      <div class="sidebar-footer">
        <button id="btn-open-folder" class="btn btn-ghost btn-sm">Open Project Folder</button>
      </div>
    </aside>

    <!-- Log panel -->
    <section class="log-panel">
      <div class="log-header">
        <span id="log-title" class="log-title">Select a service</span>
        <div class="log-actions">
          <button id="btn-clear-log" class="btn btn-ghost btn-xs" title="Clear log">Clear</button>
          <label class="checkbox-label">
            <input type="checkbox" id="chk-autoscroll" checked>
            Auto-scroll
          </label>
        </div>
      </div>
      <div id="log-output" class="log-output">
        <div class="log-empty">Select a service to view logs</div>
      </div>
      <div id="console-input-bar" class="console-input-bar hidden">
        <span class="console-prompt">&gt;</span>
        <input type="text" id="console-input" class="console-input" placeholder="Type a server command..." autocomplete="off" spellcheck="false">
        <button id="btn-send-cmd" class="btn btn-primary btn-xs">Send</button>
      </div>
    </section>
  </main>

  <!-- ── Settings modal ─────────────────────────────────────── -->
  <div id="settings-modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <h2>Settings</h2>
      <div class="setting-row">
        <label><input type="checkbox" id="set-autostart"> Auto-start services on launch</label>
      </div>
      <div class="setting-row">
        <label><input type="checkbox" id="set-tray" checked> Minimize to system tray on close</label>
      </div>
      <div class="setting-row">
        <label><input type="checkbox" id="set-minimized"> Start minimized (tray only)</label>
      </div>
      <div class="modal-footer">
        <button id="btn-save-settings" class="btn btn-primary btn-sm">Save</button>
        <button id="btn-cancel-settings" class="btn btn-ghost btn-sm">Cancel</button>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
